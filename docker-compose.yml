services:
  postgres:
    image: postgres:16
    container_name: form-cbt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cbt_exam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_database
    ports:
      - "5433:5432"
    volumes:
      - form_cbt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cbt_exam"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  form_cbt_pgdata:
